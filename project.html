<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:wght@600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .project-page {
      padding: 48px 0 80px;
    }

    .project-shell {
      display: grid;
      gap: 20px;
    }

    .back-link {
      display: inline-block;
      color: var(--text-soft);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .project-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .project-title {
      margin: 0;
      font-family: "Source Serif 4", serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.04;
      letter-spacing: -0.03em;
    }

    .project-sub {
      margin: 12px 0 0;
      color: var(--text-soft);
    }

    .project-section-title {
      margin: 0 0 12px;
      font-size: 1.08rem;
      font-weight: 700;
    }

    .project-box p {
      margin: 0;
      color: var(--text-soft);
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      margin-top: 16px;
    }

    .media-placeholder {
      min-height: 180px;
      border: 1px dashed var(--line-dark);
      border-radius: 16px;
      background: #fafaf8;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-align: center;
      padding: 18px;
    }

    .tech-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }

    .tech-grid span {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--soft);
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    .project-links {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .project-links a {
      color: var(--text-soft);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }

    @media (max-width: 760px) {
      .media-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="grid-wrapper" aria-hidden="true">
    <div class="grid-background"></div>
  </div>

  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand">Omkar Mishra</a>
    </div>
  </header>

  <main class="project-page">
    <div class="container project-shell">
      <a href="index.html#projects" class="back-link">← Back</a>

      <section class="project-box">
        <p class="section-kicker">Demo Project</p>
        <h1 class="project-title">Project Placeholder</h1>
        <p class="project-sub">This page is ready for future project content.</p>
      </section>

      <section class="project-box">
        <h2 class="project-section-title">Description</h2>
        <p>
          Add the project description here later.
        </p>
      </section>

      <section class="project-box">
        <h2 class="project-section-title">Tech Stack</h2>
        <div class="tech-grid">
          <span>Python</span>
          <span>NumPy</span>
          <span>PyTorch</span>
          <span>REBOUND</span>
        </div>
      </section>

      <section class="project-box">
        <h2 class="project-section-title">Links</h2>
        <div class="project-links">
          <a href="https://github.com/0mies0rbit" target="_blank" rel="noreferrer">GitHub Repository</a>
        </div>
      </section>

      <section class="project-box">
        <h2 class="project-section-title">Media</h2>
        <div class="media-grid">
          <div class="media-placeholder">Screenshot placeholder</div>
          <div class="media-placeholder">
            <img src="chart.png">
          </div>
          <div id="video-container" class="media-placeholder"></div>
          <div class="media-placeholder">Interactive demo placeholder</div>
        </div>
      </section>
    </div>
  </main>
  <script src="project.js"></script>
</body>

</html>
